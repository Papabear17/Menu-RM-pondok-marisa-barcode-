<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR Code Generator - RM. Pondok Marisa</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        body {
            font-family: 'Outfit', sans-serif;
            background-color: #F8F9FB;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 1rem;
        }
        .container {
            background: white;
            padding: 2rem;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            max-width: 400px;
            width: 100%;
            text-align: center;
        }
        h1 { color: #2D3748; font-size: 1.5rem; margin-bottom: 0.5rem; }
        p { color: #718096; font-size: 0.9rem; margin-bottom: 1.5rem; }
        input {
            width: 100%;
            padding: 0.8rem;
            border: 1px solid #E2E8F0;
            border-radius: 8px;
            margin-bottom: 1rem;
            font-family: 'Outfit', sans-serif;
            box-sizing: border-box;
        }
        button {
            background: #FF5A5F;
            color: white;
            border: none;
            padding: 0.8rem 1.5rem;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            width: 100%;
            margin-bottom: 1.5rem;
            transition: 0.3s;
        }
        button:hover { background: #E0484A; }
        
        #qrcode {
            display: flex;
            justify-content: center;
            margin-bottom: 1.5rem;
            padding: 1rem;
            background: #fff;
            border: 1px dashed #E2E8F0;
            border-radius: 8px;
            min-height: 200px;
            align-items: center;
        }
        #qrcode img {
            max-width: 100%;
        }
        .btn-download {
            background: #2D3748;
            display: none;
            text-decoration: none;
            color: white;
            padding: 0.8rem 1.5rem;
            border-radius: 8px;
            font-weight: 500;
        }
        .btn-download:hover { background: #1A202C; }
    </style>
</head>
<body>

<div class="container">
    <h1>Cetak QR Code Meja</h1>
    <p>Masukkan link menu website Anda (misal link GitHub Pages) untuk membuat QR Code yang bisa di-scan pelanggan.</p>
    
    <input type="url" id="urlInput" placeholder="https://syafiq.github.io/RM-Pondok-Marisa" required>
    <button onclick="generateQR()">Buat QR Code</button>

    <div id="qrcode">
        <span style="color: #A0AEC0; font-size: 0.9rem;">Preview QR Code...</span>
    </div>

    <a id="downloadBtn" class="btn-download" download="menu-qr-code.png">Unduh (Download) Gambar QR</a>
</div>

<script>
    let qrcode = null;

    function generateQR() {
        const url = document.getElementById("urlInput").value;
        const qrcodeContainer = document.getElementById("qrcode");
        const downloadBtn = document.getElementById("downloadBtn");

        if (!url) {
            alert("Harap masukkan link URL website Anda.");
            return;
        }

        // Hapus qr lama
        qrcodeContainer.innerHTML = "";

        // Buat baru
        qrcode = new QRCode(qrcodeContainer, {
            text: url,
            width: 200,
            height: 200,
            colorDark : "#000000",
            colorLight : "#ffffff",
            correctLevel : QRCode.CorrectLevel.H
        });

        // Tampilkan tombol download setelah delay (karena library me-render gambar sedikit terlambat)
        setTimeout(() => {
            const img = qrcodeContainer.querySelector("img");
            if (img && img.src) {
                downloadBtn.href = img.src;
                downloadBtn.style.display = "inline-block";
            } else {
                // Fallback untuk canvas
                const canvas = qrcodeContainer.querySelector("canvas");
                if (canvas) {
                    downloadBtn.href = canvas.toDataURL("image/png");
                    downloadBtn.style.display = "inline-block";
                }
            }
        }, 500);
    }
</script>

</body>
</html>
