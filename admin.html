<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - RM Pondok Marisa</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <style>
        body { font-family: 'Outfit', sans-serif; background-color: #FFFDE4; color: #2B2D42; margin: 0; padding: 20px; }
        .container { max-width: 600px; margin: 0 auto; background: white; padding: 2rem; border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        h1, h2 { color: #D90429; margin-top: 0; }
        label { font-weight: 600; display: block; margin-top: 1rem; margin-bottom: 0.3rem;}
        input[type="text"], input[type="number"], select { width: 100%; padding: 0.8rem; border: 1px solid #E2E8F0; border-radius: 8px; font-family: 'Outfit'; box-sizing: border-box; margin-bottom: 0.5rem; }
        button { border: none; padding: 1rem; border-radius: 8px; width: 100%; font-weight: 600; font-size: 1rem; cursor: pointer; margin-top: 1rem; font-family: 'Outfit'; transition: 0.3s; }
        .btn-green { background-color: #2D6A4F; color: white; }
        .btn-green:hover { background-color: #1B4332; }
        .btn-red { background-color: #D90429; color: white; padding: 0.5rem; font-size: 0.8rem; margin-top: 0.5rem; width: auto; }
        .btn-blue { background-color: #2D6A4F; color: white; padding: 0.8rem; margin-top: 0; }
        
        .item-card { border: 1px solid #E2E8F0; border-radius: 8px; padding: 1rem; margin-bottom: 1.5rem; position: relative; background: #fff; }
        .add-card { border: 2px dashed #D90429; background: #FEF9C3; padding: 1.5rem; border-radius: 12px; margin-bottom: 2rem; }
        
        .flex-row { display: flex; gap: 1rem; justify-content: space-between; margin-bottom: 0.5rem;}
        .flex-row > div { flex: 1; }
        
        .image-preview-container { margin-top: 0.5rem; display: flex; align-items: center; gap: 1rem; }
        .img-preview { width: 80px; height: 80px; object-fit: cover; border-radius: 8px; background: #eee; border: 1px solid #ddd; }
        
        .success-msg { background: #C6F6D5; color: #22543D; padding: 1rem; border-radius: 8px; margin-bottom: 1rem; display: none; line-height: 1.5; }
        .status-badge { display: inline-block; padding: 0.5rem 1rem; border-radius: 20px; background: #FFFDE4; color: #2B6CB0; font-weight: 600; font-size: 0.8rem; margin-bottom: 1rem; border: 1px solid #D90429;}
        
        #loading-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.9); z-index: 1000; display: none; align-items: center; justify-content: center; font-size: 1.2rem; font-weight: bold; color: #D90429; flex-direction: column; gap: 1rem; }
        .spinner { width: 40px; height: 40px; border: 4px solid #f3f3f3; border-top: 4px solid #D90429; border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div id="loading-overlay">
    <div class="spinner"></div>
    <span id="loading-text">Menghubungkan ke Database...</span>
</div>

<div class="container">
    <div style="display:flex; justify-content: space-between; align-items: center; margin-bottom: 1rem;">
        <h1>Admin Menu</h1>
        <a href="index.html" style="color: #718096; text-decoration: none;"><i class="ph ph-arrow-left"></i> Kembali</a>
    </div>

    <div class="status-badge"><i class="ph-fill ph-check-circle"></i> Terhubung dengan Cloud Database</div>

    <div id="success-alert" class="success-msg"></div>

    <button class="btn-green" onclick="saveToDatabase()"><i class="ph ph-cloud-arrow-up"></i> SIMPAN & PUBLIKASIKAN PERUBAHAN</button>

    <!-- SETTING INFO RESTORAN -->
    <div class="add-card" style="border: 2px solid #2B6CB0; background: #EBF8FF; margin-top: 1rem;">
        <h2 style="font-size: 1.1rem; color: #2B6CB0; margin-bottom: 1rem;"><i class="ph ph-storefront"></i> Pengaturan Toko (Info WA & Jam Buka)</h2>
        <div class="flex-row">
            <div>
                <label>Nama Restoran</label>
                <input type="text" id="info-name">
            </div>
            <div>
                <label>Jam Operasional</label>
                <input type="text" id="info-hours">
            </div>
        </div>
        <label>Nomor WhatsApp (Contoh: 6285101191675)</label>
        <input type="text" id="info-wa" placeholder="Gunakan format 62 tanpa + atau 0">
    </div>

    <!-- FORM TAMBAH MENU BARU -->
    <div class="add-card">
        <h2 style="font-size: 1.2rem;"><i class="ph ph-plus-circle"></i> Tambah Menu Baru</h2>
        <label>Nama Menu</label>
        <input type="text" id="new-item-name" placeholder="Contoh: Ayam Bakar Spesial">
        
        <div class="flex-row">
            <div>
                <label>Harga (Rp)</label>
                <input type="number" id="new-item-price" placeholder="25000">
            </div>
            <div>
                <label>Kategori</label>
                <select id="new-item-category">
                    <option value="makanan">Makanan</option>
                    <option value="minuman">Minuman</option>
                    <option value="cemilan">Cemilan</option>
                </select>
            </div>
        </div>
        
        <label>Foto Menu</label>
        <input type="file" id="new-item-image" accept="image/*" style="padding: 0.5rem 0;">
        
        <button class="btn-blue" onclick="addNewItem()"><i class="ph ph-plus"></i> Tambahkan ke Daftar</button>
    </div>

    <hr style="border: none; border-top: 1px solid #E2E8F0; margin: 2rem 0;">

    <div id="tab-editor">
        <h2 style="font-size: 1.1rem; color: #D90429;">Daftar Menu Saat Ini</h2>
        <p style="font-size: 0.85rem; color: #8D99AE; margin-bottom: 1.5rem;">Perubahan di bawah hanya akan disimpan setelah Anda menekan tombol <b>SIMPAN</b> di bagian paling atas.</p>
        
        <div id="items-container"></div>
    </div>
</div>

<!-- Firebase SDKs -->
<script src="https://www.gstatic.com/firebasejs/10.9.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.9.0/firebase-database-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.9.0/firebase-storage-compat.js"></script>
<script src="firebase-config.js"></script>

<script>
    let menuData = null;

    function showLoading(text) {
        document.getElementById('loading-overlay').style.display = 'flex';
        document.getElementById('loading-text').innerText = text;
    }

    function hideLoading() {
        document.getElementById('loading-overlay').style.display = 'none';
    }

    document.addEventListener("DOMContentLoaded", () => {
        showLoading('Memuat menu...');
        // Ambil data dari Firebase
        db.ref('restaurant_menu').on('value', (snapshot) => {
            if (snapshot.exists()) {
                menuData = snapshot.val();
                
                // Isi field info restoran
                document.getElementById('info-name').value = menuData.restaurantInfo.name;
                document.getElementById('info-hours').value = menuData.restaurantInfo.openHours;
                document.getElementById('info-wa').value = menuData.restaurantInfo.whatsapp;

                renderVisualEditor();
                hideLoading();
            } else {
                // Jika kosong, fetch menu.json default
                fetch('menu.json').then(r => r.json()).then(data => {
                    menuData = data;
                    renderVisualEditor();
                    hideLoading();
                });
            }
        });
    });

    async function uploadImage(file) {
        if (!file) return null;
        const fileName = new Date().getTime() + "_" + file.name;
        const fileRef = storage.child('images/' + fileName);
        
        showLoading('Mengunggah foto...');
        try {
            const snapshot = await fileRef.put(file);
            const url = await snapshot.ref.getDownloadURL();
            return url;
        } catch (error) {
            console.error("Gagal unggah gambar:", error);
            alert("Gagal mengunggah foto. Pastikan Firebase Storage sudah aktif di Console.");
            return null;
        } finally {
            hideLoading();
        }
    }

    async function addNewItem() {
        const name = document.getElementById('new-item-name').value;
        const price = parseInt(document.getElementById('new-item-price').value);
        const category = document.getElementById('new-item-category').value;
        const imageFile = document.getElementById('new-item-image').files[0];

        if (!name || isNaN(price)) {
            alert("Nama dan Harga wajib diisi!");
            return;
        }

        let imageUrl = "https://images.unsplash.com/photo-1546069901-ba9599a7e63c?q=80&w=500&auto=format&fit=crop"; // default
        
        if (imageFile) {
            imageUrl = await uploadImage(imageFile);
            if (!imageUrl) return;
        }

        const newItem = {
            id: new Date().getTime(),
            name: name,
            price: price,
            category: category,
            description: "Menu lezat buatan RM Pondok Marisa.",
            image: imageUrl,
            recommended: false
        };

        if (!menuData.items) menuData.items = [];
        menuData.items.unshift(newItem); // Tambah ke atas
        
        // Reset form
        document.getElementById('new-item-name').value = '';
        document.getElementById('new-item-price').value = '';
        document.getElementById('new-item-image').value = '';

        renderVisualEditor();
    }

    function deleteItem(index) {
        if (confirm("Hapus menu ini?")) {
            menuData.items.splice(index, 1);
            renderVisualEditor();
        }
    }

    function renderVisualEditor() {
        const container = document.getElementById("items-container");
        container.innerHTML = "";

        if(!menuData || !menuData.items) return;

        menuData.items.forEach((item, index) => {
            const card = document.createElement("div");
            card.className = "item-card";
            
            card.innerHTML = `
                <div style="display:flex; justify-content: space-between;">
                    <div style="font-weight: 600; font-size: 1.1rem; color: #E0484A;">${item.name}</div>
                    <button class="btn-red" onclick="deleteItem(${index})"><i class="ph ph-trash"></i> Hapus</button>
                </div>
                <div class="image-preview-container">
                    <img src="${item.image}" class="img-preview" id="img-preview-${index}">
                    <div style="flex-grow:1;">
                        <label style="margin-top:0;">Ganti Foto</label>
                        <input type="file" accept="image/*" onchange="updateItemImage(${index}, this.files[0])" style="font-size: 0.8rem;">
                    </div>
                </div>
                <div class="flex-row">
                    <div>
                        <label>Nama Menu</label>
                        <input type="text" id="itemName_${index}" value="${item.name}" onchange="updateItemData(${index})">
                    </div>
                    <div>
                        <label>Harga (Rp)</label>
                        <input type="number" id="itemPrice_${index}" value="${item.price}" onchange="updateItemData(${index})">
                    </div>
                </div>
            `;
            container.appendChild(card);
        });
    }

    async function updateItemImage(index, file) {
        if (!file) return;
        const url = await uploadImage(file);
        if (url) {
            menuData.items[index].image = url;
            renderVisualEditor();
        }
    }

    function updateItemData(index) {
        menuData.items[index].name = document.getElementById(`itemName_${index}`).value;
        menuData.items[index].price = parseInt(document.getElementById(`itemPrice_${index}`).value) || 0;
    }

    function saveToDatabase() {
        if(!menuData) return;
        
        // Update restaurant info dari input sebelum simpan
        menuData.restaurantInfo.name = document.getElementById('info-name').value;
        menuData.restaurantInfo.openHours = document.getElementById('info-hours').value;
        menuData.restaurantInfo.whatsapp = document.getElementById('info-wa').value;

        showLoading('Menyimpan ke Cloud...');

        // SIMPAN KE FIREBASE
        db.ref('restaurant_menu').set(menuData)
            .then(() => {
                hideLoading();
                const succ = document.getElementById("success-alert");
                succ.innerHTML = "<b>&#10004; Sukses Memublikasikan!</b> Perubahan sudah live di internet.";
                succ.style.display = "block";
                window.scrollTo(0, 0);
                setTimeout(() => { succ.style.display = "none"; }, 5000);
            })
            .catch(error => {
                hideLoading();
                alert("GAGAL: Pastikan koneksi internet stabil atau cek izin database.");
                console.error(error);
            });
    }
</script>

</body>
</html>
